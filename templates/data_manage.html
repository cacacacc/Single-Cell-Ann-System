{% extends "base.html" %}

{% block content %}
<style>
    /* 针对数据表格的深色科技风格重置 */
    .table-dark-fluent {
        color: var(--text-main);
        vertical-align: middle;
    }
    .table-dark-fluent thead th {
        background-color: rgba(255, 255, 255, 0.03);
        color: var(--text-muted);
        border-bottom: 2px solid var(--nankai-purple);
        font-weight: 600;
        padding: 15px;
    }
    .table-dark-fluent tbody td {
        background-color: transparent;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 15px;
        color: #d1d5db;
    }
    .table-dark-fluent tbody tr:hover td {
        background-color: rgba(111, 38, 86, 0.1); /* 南开紫极浅的悬浮底色 */
    }

    /* 顶部命令栏按钮 */
    .cmd-btn {
        background-color: #222B45;
        color: var(--text-main);
        border: 1px solid rgba(255,255,255,0.1);
        padding: 8px 16px;
        border-radius: 6px;
        margin-right: 10px;
        transition: all 0.2s;
    }
    .cmd-btn:hover { background-color: #2e3a59; color: white; }
    /* 提亮变浅的紫色，并增加质感 */
    .cmd-btn-primary { 
        background-color: #923a73; /* 更浅、更明亮的紫红色 */
        border-color: #923a73; 
        color: white;
        font-weight: 500;
    }
    .cmd-btn-primary:hover { 
        background-color: #a84685; /* 鼠标放上去时进一步变浅 */
        border-color: #a84685;
        color: white;
        /* 增加一层漂亮的科技感发光特效 */
        box-shadow: 0 0 15px rgba(168, 70, 133, 0.5); 
    }
    .cmd-btn-primary:hover { background-color: #8a316d; }

    /* 操作列小图标按钮 */
    .action-icon {
        color: var(--text-muted);
        cursor: pointer;
        margin: 0 8px;
        font-size: 1.1rem;
        transition: color 0.2s;
    }
    .action-icon:hover { color: var(--text-main); }
    .action-icon.build { color: #4A90E2; }
    .action-icon.delete:hover { color: #ff6b6b; }

    /* 右侧抽屉样式覆盖 */
    .offcanvas-dark {
        background-color: var(--bg-card);
        color: var(--text-main);
        border-left: 1px solid rgba(255,255,255,0.1);
    }
    /* 1. 彻底抹杀原生复选框样式，重绘一个完美的暗色复选框 */
    .table-dark-fluent input[type="checkbox"] {
        appearance: none; /* 干掉操作系统和浏览器的默认样式 */
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        background-color: rgba(0, 0, 0, 0.4) !important; /* 强制暗色底 */
        border: 1px solid #8A96A8 !important; /* 灰色边框 */
        border-radius: 4px;
        cursor: pointer;
        display: inline-block;
        position: relative;
        outline: none !important; /* 绝对禁止出现焦点白框 */
        box-shadow: none !important; /* 绝对禁止出现任何发光晕 */
        margin: 0;
        vertical-align: middle;
    }

    /* 2. 选中时的南开紫状态 */
    .table-dark-fluent input[type="checkbox"]:checked {
        background-color: var(--nankai-purple) !important;
        border-color: var(--nankai-purple) !important;
    }

    /* 3. 自己画一个纯白色的对号 (✓) */
    .table-dark-fluent input[type="checkbox"]:checked::after {
        content: '';
        position: absolute;
        left: 5px;
        top: 2px;
        width: 5px;
        height: 10px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }
    
    /* 4. 让整行鼠标变成手型，提示用户可以点击整行 */
    .table-dark-fluent tbody tr {
        cursor: pointer;
    }
    
    /* 拖拽上传区域 */
    .upload-zone {
        border: 2px dashed rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 50px 20px;
        text-align: center;
        background-color: rgba(0,0,0,0.2);
        cursor: pointer;
        transition: all 0.3s;
    }
    .upload-zone:hover, .upload-zone.dragover {
        border-color: var(--nankai-purple);
        background-color: rgba(111, 38, 86, 0.1);
    }
</style>

<!-- 顶部操作栏 (Command Bar) -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold m-0" style="letter-spacing: 1px;">数据管理中心</h3>
    <div>
        <button class="cmd-btn cmd-btn-primary" data-bs-toggle="offcanvas" data-bs-target="#uploadPanel">
            <i class="fa-solid fa-cloud-arrow-up me-2"></i>上传数据集
        </button>
        <button class="cmd-btn" onclick="batchDelete()">
            <i class="fa-solid fa-trash me-2"></i>批量删除
        </button>
        <button class="cmd-btn" onclick="location.reload()">
            <i class="fa-solid fa-rotate-right me-2"></i>刷新
        </button>
    </div>
</div>

<!-- 主内容区：数据表格卡片 -->
<div class="dark-card" style="padding: 0; overflow: hidden;">
    <table class="table table-dark-fluent mb-0 w-100">
        <thead>
            <tr>
                <th style="width: 50px; text-align: center;"><input type="checkbox" id="selectAll" class="table-checkbox"></th>
                <th>数据集 ID / 名称</th>
                <th>细胞总数</th>
                <th>基因维度</th>
                <th>上传者 & 时间</th>
                <th>当前索引状态</th>
                <th class="text-center">操作</th>
            </tr>
        </thead>
        <tbody id="dataset-tbody">
            <tr>
                <td colspan="7" class="text-center py-5" style="color: #8A96A8;">
                    正在加载数据集列表...
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- ================= 1. 右侧滑出抽屉：上传数据集 ================= -->
<div class="offcanvas offcanvas-end offcanvas-dark" tabindex="-1" id="uploadPanel" style="width: 450px;">
    <div class="offcanvas-header border-bottom border-secondary">
        <h5 class="offcanvas-title fw-bold"><i class="fa-solid fa-cloud-arrow-up me-2" style="color: var(--nankai-purple);"></i>新增单细胞数据</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <div class="mb-4">
            <label class="form-label text-muted">支持格式：.h5ad / .csv</label>
            <!-- 拖拽区 -->
            <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-file-arrow-up fa-3x mb-3" style="color: #4A90E2;"></i>
                <h5 class="text-white">点击或将文件拖拽至此处</h5>
                <p class="text-muted small mb-0">最大支持文件大小: 2GB</p>
                <input type="file" id="file-input" style="display: none;" accept=".h5ad,.csv">
            </div>
        </div>

        <!-- 进度条区域 (默认隐藏) -->
        <div id="upload-progress-area" style="display: none;">
            <div class="d-flex justify-content-between mb-1">
                <span id="progress-text" style="font-size: 0.9rem; color: #4A90E2;">格式校验中...</span>
                <span id="progress-percent" style="font-size: 0.9rem;">0%</span>
            </div>
            <div class="progress" style="height: 8px; background-color: rgba(255,255,255,0.1);">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" id="upload-bar" style="width: 0%"></div>
            </div>
        </div>
    </div>
</div>

<!-- ================= 2. 居中模态弹窗：构建索引 ================= -->
<div class="modal fade" id="buildIndexModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: var(--bg-card); color: white; border: 1px solid rgba(255,255,255,0.1);">
            <div class="modal-header border-bottom border-secondary">
                <h5 class="modal-title fw-bold"><i class="fa-solid fa-microchip me-2" style="color: #4A90E2;"></i>ANN 索引构建</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding: 30px;">
                <!-- 优化 1：提亮“目标数据集”前缀文字 -->
                <p class="mb-4" style="color: #A0AABF; font-size: 1.05rem;">
                    目标数据集：<strong id="target-dataset-name" class="text-white ms-1"></strong>
                </p>
                
                <!-- 优化 2：提亮说明性标题 -->
                <label class="form-label mb-3" style="color: #A0AABF;">选择底层算法结构</label>
                
                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="annAlgo" id="algoHNSW" checked>
                    <label class="form-check-label text-white" for="algoHNSW">
                        <strong>FAISS - HNSW</strong> <span style="color: #2ecc71; font-size: 0.9rem;">(推荐)</span><br>
                        <!-- 优化 3：大幅提亮小字说明，并增加行高 -->
                        <div style="color: #8A96A8; font-size: 0.9rem; margin-top: 5px; line-height: 1.5;">
                            查询速度极快，召回率高，但内存占用较大。
                        </div>
                    </label>
                </div>
                
                <div class="form-check mb-4">
                    <input class="form-check-input" type="radio" name="annAlgo" id="algoIVF">
                    <label class="form-check-label text-white" for="algoIVF">
                        <strong>FAISS - IVF + PQ</strong><br>
                        <!-- 优化 4：大幅提亮小字说明 -->
                        <div style="color: #8A96A8; font-size: 0.9rem; margin-top: 5px; line-height: 1.5;">
                            经过向量压缩，极低内存占用，适合超大规模数据。
                        </div>
                    </label>
                </div>

                <!-- 建库进度 (默认隐藏) -->
                <div id="build-progress-area" style="display: none; text-align: center; margin-top: 20px;">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <div style="color: #A0AABF; font-size: 0.95rem;">正在构建高维向量网络，请耐心等待...</div>
                </div>
            </div>
            <div class="modal-footer border-top border-secondary">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn cmd-btn-primary" id="start-build-btn" onclick="startBuilding()">开始构建</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- 必须引入 Bootstrap JS 才能触发弹窗和抽屉 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const datasetTbody = document.getElementById('dataset-tbody');
    const fileInput = document.getElementById('file-input');
    const uploadArea = document.getElementById('upload-progress-area');
    const uploadBar = document.getElementById('upload-bar');
    const progressText = document.getElementById('progress-text');
    const progressPercent = document.getElementById('progress-percent');
    const selectAll = document.getElementById('selectAll');
    let targetDatasetId = null;

    function formatNumber(val) {
        if (val === null || val === undefined) return '-';
        return Number(val).toLocaleString();
    }

    function renderDatasets(datasets) {
        if (!datasets || datasets.length === 0) {
            datasetTbody.innerHTML = '<tr><td colspan="7" class="text-center py-5" style="color: #8A96A8;">暂无数据集</td></tr>';
            return;
        }

        datasetTbody.innerHTML = datasets.map(ds => {
            const statusBadge = ds.index_status === 'ready'
                ? `<span class="badge" style="background-color: var(--nankai-purple); padding: 6px 10px;">${ds.index_backend || 'READY'}</span>`
                : '<span class="badge bg-secondary" style="padding: 6px 10px;">未建索引</span>';
            const metaLine = ds.modified_at ? ds.modified_at : '-';
            return `
                <tr data-dataset-id="${ds.id}">
                    <td class="text-center"><input type="checkbox" class="table-checkbox row-checkbox"></td>
                    <td>
                        <div class="fw-bold text-white">${ds.id}</div>
                        <small style="color: var(--text-muted);">${ds.filename || '-'}</small>
                    </td>
                    <td>${formatNumber(ds.n_cells)}</td>
                    <td>${formatNumber(ds.n_genes)}</td>
                    <td>
                        <div>系统导入</div>
                        <small style="color: var(--text-muted);">${metaLine}</small>
                    </td>
                    <td>${statusBadge}</td>
                    <td class="text-center">
                        <i class="fa-solid fa-circle-info action-icon" title="详情" data-action="info"></i>
                        <i class="fa-solid fa-microchip action-icon build" title="构建索引" data-action="build" data-bs-toggle="modal" data-bs-target="#buildIndexModal"></i>
                        <i class="fa-solid fa-trash action-icon delete" title="删除" data-action="delete"></i>
                    </td>
                </tr>
            `;
        }).join('');

        syncSelectAllState();
    }

    async function loadDatasets() {
        try {
            const res = await fetch('/api/datasets');
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '加载失败');
            renderDatasets(data.datasets || []);
        } catch (err) {
            datasetTbody.innerHTML = '<tr><td colspan="7" class="text-center py-5" style="color: #ff6b6b;">加载失败</td></tr>';
        }
    }

    function setTargetData(datasetId) {
        targetDatasetId = datasetId;
        document.getElementById('target-dataset-name').innerText = datasetId || '-';
        document.getElementById('build-progress-area').style.display = 'none';
        document.getElementById('start-build-btn').style.display = 'block';
    }

    async function startBuilding() {
        if (!targetDatasetId) {
            alert('请先选择数据集');
            return;
        }

        document.getElementById('start-build-btn').style.display = 'none';
        document.getElementById('build-progress-area').style.display = 'block';

        try {
            const res = await fetch('/api/index/build', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dataset_id: targetDatasetId })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '构建失败');

            const modalEl = document.getElementById('buildIndexModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();
            await loadDatasets();
            alert('索引构建成功！');
        } catch (err) {
            alert(err.message || '构建失败');
        } finally {
            document.getElementById('build-progress-area').style.display = 'none';
            document.getElementById('start-build-btn').style.display = 'block';
        }
    }

    async function deleteDataset(datasetId) {
        if (!confirm(`确定删除数据集 ${datasetId} 吗？此操作不可恢复。`)) {
            return;
        }
        try {
            const res = await fetch(`/api/datasets/${datasetId}`, { method: 'DELETE' });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '删除失败');
            await loadDatasets();
        } catch (err) {
            alert(err.message || '删除失败');
        }
    }

    function getRowCheckboxes() {
        return document.querySelectorAll('#dataset-tbody .row-checkbox');
    }

    function syncSelectAllState() {
        const rows = getRowCheckboxes();
        const checkedCount = document.querySelectorAll('#dataset-tbody .row-checkbox:checked').length;
        selectAll.checked = checkedCount === rows.length && rows.length > 0;
        selectAll.indeterminate = checkedCount > 0 && checkedCount < rows.length;
    }

    selectAll.addEventListener('change', function(e) {
        const isChecked = e.target.checked;
        getRowCheckboxes().forEach(box => {
            box.checked = isChecked;
        });
        selectAll.indeterminate = false;
    });

    function batchDelete() {
        const checkedBoxes = document.querySelectorAll('#dataset-tbody .row-checkbox:checked');
        const ids = Array.from(checkedBoxes).map(box => box.closest('tr').dataset.datasetId);
        if (ids.length === 0) {
            alert('⚠️ 请先勾选需要删除的数据集！');
            return;
        }
        if (!confirm(`确定要彻底删除选中的 ${ids.length} 个数据集及其索引吗？\n警告：此操作不可恢复！`)) {
            return;
        }
        Promise.all(ids.map(id => fetch(`/api/datasets/${id}`, { method: 'DELETE' })))
            .then(() => loadDatasets())
            .catch(() => alert('批量删除失败'));
    }

    function uploadFile(file) {
        uploadArea.style.display = 'block';
        uploadBar.style.width = '0%';
        uploadBar.classList.remove('bg-success');
        uploadBar.classList.add('bg-primary');
        progressText.innerText = '开始上传...';
        progressPercent.innerText = '0%';

        const formData = new FormData();
        formData.append('file', file);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/datasets/upload');
        xhr.upload.onprogress = function(evt) {
            if (!evt.lengthComputable) return;
            const percent = Math.round((evt.loaded / evt.total) * 100);
            uploadBar.style.width = percent + '%';
            progressPercent.innerText = percent + '%';
            progressText.innerText = percent < 90 ? '上传中...' : '即将完成...';
        };
        xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 300) {
                uploadBar.classList.replace('bg-primary', 'bg-success');
                progressText.innerText = '上传成功，正在刷新列表...';
                loadDatasets();
            } else {
                progressText.innerText = '上传失败';
                alert('上传失败，请检查文件格式');
            }
        };
        xhr.onerror = function() {
            progressText.innerText = '上传失败';
            alert('上传失败，请检查网络或后端');
        };
        xhr.send(formData);
    }

    fileInput.addEventListener('change', function() {
        if (this.files.length > 0) {
            uploadFile(this.files[0]);
        }
    });

    datasetTbody.addEventListener('click', function(e) {
        const row = e.target.closest('tr');
        if (!row) return;
        const datasetId = row.dataset.datasetId;

        if (e.target.classList.contains('action-icon')) {
            const action = e.target.dataset.action;
            if (action === 'build') {
                setTargetData(datasetId);
                return;
            }
            if (action === 'delete') {
                deleteDataset(datasetId);
                return;
            }
            if (action === 'info') {
                alert(`数据集: ${datasetId}`);
                return;
            }
        }

        if (e.target.tagName.toLowerCase() === 'input') {
            syncSelectAllState();
            return;
        }

        const checkbox = row.querySelector('input[type="checkbox"]');
        if (checkbox) {
            checkbox.checked = !checkbox.checked;
            syncSelectAllState();
        }
    });

    loadDatasets();
</script>
{% endblock %}
