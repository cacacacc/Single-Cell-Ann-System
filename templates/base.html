<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>单细胞近邻检索系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>

    <!-- 侧边栏 -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-box">
                <!-- 换成了 DNA 图标，你也可以换成 fa-chart-scatter (散点图) -->
                <i class="fa-solid fa-dna"></i>
            </div>
            <span>单细胞近邻检索系统</span>
        </div>
        
        <div class="nav flex-column">
            <!-- 1. 首页 -->
            <a class="nav-link" href="/"><i class="fa-solid fa-desktop"></i> 主要信息</a>
            
            <!-- 2. 数据管理页 -->
            <a class="nav-link" href="/data"><i class="fa-solid fa-database"></i> 数据管理</a>
            
            <!-- 3. 相似检索页 -->
            <a class="nav-link" href="/search"><i class="fa-solid fa-magnifying-glass-chart"></i> 相似检索</a>
            
            <!-- 4. 性能评测页 (暂时用 # 占位，或者等以后写了 benchmark.html 再指过去) -->
            <a class="nav-link" href="/benchmark"><i class="fa-solid fa-stopwatch"></i> 性能评测</a>
            
            <!-- 5. 个人信息页 (指向 /profile，我们上一轮刚写好的页面) -->
            <a class="nav-link" href="/profile"><i class="fa-solid fa-user"></i> 个人信息</a>
            
            <!-- 6. 用户管理页 (对应你的 /users 路由) -->
            <a class="nav-link" href="/users"><i class="fa-solid fa-users-gear"></i> 用户管理</a>
        </div>
    </nav>

    <!-- 右侧内容 -->
    <main class="main-content">
        <!-- 顶部状态栏-->
        <header class="topbar">
            <!-- 左侧：引擎状态与时间 -->
            <div class="topbar-left">
                <div class="engine-status">
                    <span class="status-dot"></span> ANN Engine Active
                </div>
                <div class="datetime" id="clock">正在加载时间...</div>
            </div>
            
            <!-- 右侧：搜索框与操作栏 -->
            <div class="topbar-right">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="输入搜索...">
                </div>
                <div class="topbar-actions">
                    <!-- 重点看这一行：把 href="#" 改成了 href="/login" -->
                    <a href="/login"><i class="fa-solid fa-arrow-right-from-bracket"></i> 注销</a>
                    
                    <a href="#"><i class="fa-solid fa-gear"></i></a>
                    <a href="#"><i class="fa-solid fa-bell"></i></a>
                </div>
            </div>
        </header>

        {% block content %}{% endblock %}
    </main>

    <!-- 时钟脚本 -->
    <script>
        setInterval(() => {
            const now = new Date();
            const dateStr = now.getFullYear() + '-' + 
                            String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                            String(now.getDate()).padStart(2, '0');
            const timeStr = String(now.getHours()).padStart(2, '0') + ':' + 
                            String(now.getMinutes()).padStart(2, '0') + ':' + 
                            String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = dateStr + ' ' + timeStr;
        }, 1000);
    </script>

    <!-- 自动高亮当前菜单栏的魔法脚本 -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. 获取浏览器当前的网址路径 (比如 "/" 或者 "/data")
            const currentPath = window.location.pathname;
            
            // 2. 找到侧边栏所有的超链接
            const navLinks = document.querySelectorAll('.sidebar .nav-link');
            
            // 3. 循环比对，如果超链接的网址和当前页面网址一样，就给它加上 active 样式
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
