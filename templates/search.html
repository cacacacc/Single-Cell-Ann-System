{% extends "base.html" %}

{% block content %}
<style>
    /* ================= 坚如磐石的 Flex 布局 ================= */
    .search-layout {
        display: flex;
        gap: 24px;
        /* 极其关键的一步：让左侧控制台保持自身高度，不要和右边等高，否则吸顶绝对会失效！ */
        align-items: flex-start; 
    }
    
    .search-sidebar {
        width: 320px; /* 左侧宽度永久固定，绝对不会被挤没 */
        flex-shrink: 0;
        position: sticky;
        top: 24px; /* 向下滚动时，吸附在距离屏幕顶部 24px 的位置 */
        z-index: 10;
    }
    
    .search-main {
        flex: 1; /* 右侧自动填满剩余空间 */
        min-width: 0; /* 防止大图表撑破容器 */
    }

    /* ================= 表单与组件样式 ================= */
    .form-label { color: #8A96A8; font-size: 0.9rem; margin-bottom: 8px; }
    
    .dark-control {
        background-color: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 6px;
        padding: 10px 15px;
    }
    .dark-control:focus {
        background-color: rgba(0, 0, 0, 0.4);
        border-color: #4A90E2;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        color: white;
        outline: none;
    }
    .dark-control option { background-color: #141A30; color: white; }

    .form-range::-webkit-slider-thumb { background: #923a73; }
    
    .btn-glow-purple {
        background-color: #923a73;
        border: none;
        color: white;
        font-weight: 600;
        padding: 12px;
        border-radius: 6px;
        transition: all 0.3s;
    }
    .btn-glow-purple:hover {
        background-color: #a84685;
        box-shadow: 0 0 15px rgba(168, 70, 133, 0.5);
        color: white;
    }

    /* ================= 图表与原生暗黑表格 ================= */
    .chart-box {
        background-color: #050814; 
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.05);
    }

    .table-dark-custom {
        --bs-table-bg: transparent;
        color: #FFFFFF;
        vertical-align: middle;
        margin-bottom: 0;
    }
    .table-dark-custom thead th {
        background-color: rgba(0, 0, 0, 0.2);
        color: #8A96A8;
        border-bottom: 2px solid #4A90E2;
        font-weight: 600;
        padding: 15px;
    }
    .table-dark-custom tbody td {
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .table-dark-custom tbody tr:hover td {
        background-color: rgba(111, 38, 86, 0.15); 
    }
</style>

<!-- 采用全新的 Flex 容器 -->
<div class="search-layout">
    
    <!-- ================= 左侧：参数控制台 (自带完美吸顶) ================= -->
    <div class="search-sidebar">
        <!-- 去掉了底部的 mb-4，因为高度由自身决定了 -->
        <div class="dark-card m-0">
            <h5 class="fw-bold mb-4" style="letter-spacing: 1px;">
                <i class="fa-solid fa-sliders me-2" style="color: #4A90E2;"></i>检索参数设置
            </h5>
            
            <form id="searchForm">
                <div class="mb-4">
                    <label class="form-label">目标数据集</label>
                    <select class="form-select dark-control" id="datasetSelect">
                        <option value="" disabled selected>正在加载数据集...</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">查询细胞编号 (Cell ID)</label>
                    <input type="text" class="form-control dark-control" id="queryCellId" placeholder="例如: AAACCTGAG..." value="AAACCTGAGCTAGT-1">
                </div>

                <div class="mb-4">
                    <label class="form-label d-flex justify-content-between">
                        <span>返回相似数量 (Top-K)</span>
                        <strong id="k-value" style="color: #4A90E2;">20</strong>
                    </label>
                    <input type="range" class="form-range" min="5" max="100" step="5" value="20" id="topKSlider">
                </div>

                <div class="mb-5">
                    <label class="form-label">限定细胞类型 (可选过滤)</label>
                    <select class="form-select dark-control">
                        <option value="all">-- 不限类型 --</option>
                        <option value="T_cell">T cell (免疫T细胞)</option>
                        <option value="hepatocyte">Hepatocyte (肝细胞)</option>
                        <option value="macrophage">Macrophage (巨噬细胞)</option>
                    </select>
                </div>

                <button type="button" class="btn btn-glow-purple w-100" id="startSearchBtn">
                    <i class="fa-solid fa-satellite-dish me-2"></i>开始近似检索
                </button>
            </form>
        </div>
    </div>

    <!-- ================= 右侧：大图可视化与数据表 ================= -->
    <div class="search-main">
        
        <!-- 上部：UMAP 可视化大卡片 -->
        <div class="dark-card mb-4" style="padding: 20px;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="fw-bold fs-5 text-white">UMAP 预览</span>
                <div class="d-flex align-items-center gap-3" style="font-size: 0.9rem;">
                    <div class="form-check form-check-inline m-0">
                        <input class="form-check-input" type="checkbox" id="bgSample" checked style="background-color: transparent; border-color: #4A90E2;">
                        <label class="form-check-label text-white" for="bgSample">背景抽样</label>
                    </div>
                    <div class="form-check form-check-inline m-0">
                        <input class="form-check-input" type="checkbox" id="showLegend" checked style="background-color: transparent; border-color: #4A90E2;">
                        <label class="form-check-label text-white" for="showLegend">图例</label>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-white">着色</span>
                        <select class="form-select form-select-sm dark-control py-1" style="width: auto; background-color: #141A30; color: white; border-color: rgba(255,255,255,0.2);">
                            <option>cell_type</option>
                            <option>tissue</option>
                        </select>
                    </div>
                    <button class="btn btn-sm text-white" id="redrawBtn" style="border: 1px solid rgba(255,255,255,0.2); background: transparent;">重绘</button>
                </div>
            </div>

            <!-- ECharts 渲染容器 (高度适度收紧到 420px，消除下方过多空白) -->
            <div id="umapChart" class="chart-box" style="width: 100%; height: 420px;"></div>

            <!-- 底部自定义图例区 -->
            <div id="custom-legend-box" class="mt-3 p-3" style="background-color: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px;">
                <div class="d-flex flex-wrap gap-3" id="legend-container">
                    <!-- JS 动态填入图例 -->
                </div>
                <div style="color: #8A96A8; font-size: 0.8rem; margin-top: 12px;">
                    背景为随机抽样；按所选字段着色；检索后高亮查询细胞与近邻。
                </div>
            </div>
        </div>

        <!-- 下部：数据表格卡片 -->
        <div class="dark-card" style="padding: 0; overflow: hidden;">
            <div class="px-4 py-3 d-flex justify-content-between align-items-center" style="background-color: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05);">
                <span class="fw-bold fs-5 text-white"><i class="fa-solid fa-table-list me-2" style="color: #4A90E2;"></i>Top-K 详细结果</span>
                <div>
                    <span id="search-status" class="badge bg-secondary me-3">等待查询...</span>
                    <button class="btn btn-sm" style="color: #8A96A8; border: 1px solid rgba(255,255,255,0.2);">
                        <i class="fa-solid fa-download me-1"></i>导出 CSV
                    </button>
                </div>
            </div>
            
            <table class="table table-dark-custom w-100">
                <thead>
                    <tr>
                        <th class="ps-4">Rank</th>
                        <th>细胞 ID</th>
                        <th>细胞类型 (Cell Type)</th>
                        <th>距离得分 (L2 Distance)</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="result-tbody">
                    <tr>
                        <td colspan="5" class="text-center py-5">
                            <i class="fa-solid fa-inbox fa-3x mb-3" style="color: rgba(255,255,255,0.1);"></i>
                            <div style="color: #8A96A8;">请在左侧设定参数并点击【开始近似检索】</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const slider = document.getElementById('topKSlider');
    const kValue = document.getElementById('k-value');
    const datasetSelect = document.getElementById('datasetSelect');
    slider.addEventListener('input', (e) => { kValue.innerText = e.target.value; });

    const cellCategories = [
        { name: 'T cell', color: '#4A90E2', count: 341, center: [-20, 20] },
        { name: 'Hepatocyte', color: '#E83E8C', count: 603, center: [10, -15] },
        { name: 'Macrophage', color: '#2ECC71', count: 255, center: [25, 30] },
        { name: 'Endothelial cell', color: '#F5A623', count: 138, center: [35, -25] },
        { name: 'Monocyte', color: '#9B59B6', count: 104, center: [-30, -10] },
        { name: 'NK cell', color: '#1ABC9C', count: 80, center: [0, 40] }
    ];

    const legendContainer = document.getElementById('legend-container');
    let legendHTML = '';
    cellCategories.forEach(cat => {
        legendHTML += `
            <div class="d-flex align-items-center" style="font-size: 0.85rem; color: #FFFFFF;">
                <div style="width: 12px; height: 12px; background-color: ${cat.color}; border-radius: 2px; margin-right: 6px;"></div>
                ${cat.name} <span style="color: #A0AABF; margin-left: 4px;">(${cat.count})</span>
            </div>
        `;
    });
    legendContainer.innerHTML = legendHTML;

    document.getElementById('showLegend').addEventListener('change', function(e) {
        document.getElementById('custom-legend-box').style.display = e.target.checked ? 'block' : 'none';
    });

    function generateCluster(center, color, count, typeName) {
        let data = [];
        for (let i = 0; i < count; i++) {
            let x = center[0] + (Math.random() + Math.random() + Math.random() - 1.5) * 15;
            let y = center[1] + (Math.random() + Math.random() + Math.random() - 1.5) * 15;
            data.push({ value: [x, y], name: `Cell_${Math.floor(Math.random()*10000)}`, type: typeName, itemStyle: { color: color } });
        }
        return data;
    }

    let allBackgroundData = [];
    cellCategories.forEach(cat => {
        allBackgroundData = allBackgroundData.concat(generateCluster(cat.center, cat.color, cat.count, cat.name));
    });

    const chartDom = document.getElementById('umapChart');
    const myChart = echarts.init(chartDom);
    
    let baseOption = {
        backgroundColor: 'transparent',
        tooltip: {
            backgroundColor: 'rgba(20, 26, 48, 0.9)',
            borderColor: '#4A90E2',
            textStyle: { color: '#fff' },
            formatter: function (params) {
                if(params.seriesName === '查询目标' || params.seriesName === 'Top-K 结果') {
                    return `ID: ${params.data.name}<br>Type: <span style="color:${params.color}">${params.data.type}</span><br>Dist: ${params.data.dist}`;
                }
                return `ID: ${params.data.name}<br>Type: <span style="color:${params.color}">${params.data.type}</span>`;
            }
        },
        dataZoom: [{ type: 'inside' }, { type: 'slider', show: false }],
        xAxis: { show: true, min: -60, max: 60, splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.03)' } }, axisLabel: {show: false}, axisLine: {show: false}, axisTick: {show: false} },
        yAxis: { show: true, min: -60, max: 60, splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.03)' } }, axisLabel: {show: false}, axisLine: {show: false}, axisTick: {show: false} },
        series: [{
            name: '背景聚类',
            type: 'scatter',
            symbolSize: 3,
            itemStyle: { opacity: 0.7 },
            data: allBackgroundData,
            large: true
        }]
    };
    myChart.setOption(baseOption);

    document.getElementById('redrawBtn').addEventListener('click', function() {
        this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        setTimeout(() => {
            myChart.setOption(baseOption, true);
            document.getElementById('result-tbody').innerHTML = '<tr><td colspan="5" class="text-center py-5"><i class="fa-solid fa-inbox fa-3x mb-3" style="color: rgba(255,255,255,0.1);"></i><div style="color: #8A96A8;">已重绘图谱，请重新执行检索</div></td></tr>';
            document.getElementById('search-status').className = 'badge bg-secondary me-3';
            document.getElementById('search-status').innerText = '等待查询...';
            this.innerHTML = '重绘';
        }, 500);
    });

    async function loadDatasets() {
        try {
            const res = await fetch('/api/datasets');
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '数据集加载失败');
            if (!data.datasets || data.datasets.length === 0) {
                datasetSelect.innerHTML = '<option value="" disabled selected>暂无数据集</option>';
                datasetSelect.disabled = true;
                return;
            }
            datasetSelect.innerHTML = data.datasets
                .map(ds => `<option value="${ds.id}">${ds.filename}</option>`)
                .join('');
        } catch (err) {
            datasetSelect.innerHTML = '<option value="" disabled selected>加载失败</option>';
            datasetSelect.disabled = true;
        }
    }

    document.getElementById('startSearchBtn').addEventListener('click', async function() {
        const btn = this;
        const tbody = document.getElementById('result-tbody');
        const statusBadge = document.getElementById('search-status');
        const topK = parseInt(slider.value);
        const cellId = document.getElementById('queryCellId').value.trim();
        const datasetId = datasetSelect.value;

        if (!datasetId) {
            alert('请先选择数据集');
            return;
        }
        if (!cellId) {
            alert('请输入 Cell ID');
            return;
        }

        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>检索中...';
        btn.disabled = true;
        statusBadge.className = 'badge bg-warning text-dark me-3';
        statusBadge.innerHTML = '<span class="spinner-grow spinner-grow-sm me-1"></span>引擎计算中';
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5" style="color: #8A96A8;">正在进行高维空间近邻计算...</td></tr>';

        try {
            const res = await fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dataset_id: datasetId, cell_id: cellId, k: topK })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '检索失败');

            let tableHTML = '';
            if (!data.results || data.results.length === 0) {
                tableHTML = '<tr><td colspan="5" class="text-center py-5" style="color: #8A96A8;">未找到结果</td></tr>';
            } else {
                data.results.forEach((row, idx) => {
                    tableHTML += `
                        <tr>
                            <td class="ps-4 fw-bold" style="color: #4A90E2;">#${idx + 1}</td>
                            <td class="text-white">${row.cell_id || '-'}</td>
                            <td><span class="badge" style="background-color: #E83E8C; padding: 6px 10px;">${row.cell_type || 'unknown'}</span></td>
                            <td style="color: #2ecc71; font-family: monospace; font-size: 1.1rem;">${row.distance}</td>
                            <td><button class="btn btn-sm" style="color: #8A96A8; border: 1px solid rgba(255,255,255,0.2);"><i class="fa-solid fa-crosshairs"></i></button></td>
                        </tr>
                    `;
                });
            }

            tbody.innerHTML = tableHTML;
            btn.innerHTML = '<i class="fa-solid fa-satellite-dish me-2"></i>开始近似检索';
            btn.disabled = false;
            statusBadge.className = 'badge bg-success me-3';
            statusBadge.innerHTML = `<i class="fa-solid fa-check me-1"></i>耗时 ${data.elapsed_ms}ms | ${data.index_backend || 'ANN'}`;
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5" style="color: #ff6b6b;">检索失败，请检查输入或后端日志</td></tr>';
            btn.innerHTML = '<i class="fa-solid fa-satellite-dish me-2"></i>开始近似检索';
            btn.disabled = false;
            statusBadge.className = 'badge bg-danger me-3';
            statusBadge.innerText = err.message || '检索失败';
        }
    });

    loadDatasets();

    window.addEventListener('resize', () => myChart.resize());
</script>
{% endblock %}
