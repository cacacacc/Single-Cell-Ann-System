<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 单细胞智慧可视化系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --nankai-purple: #6F2656;
            --tech-blue: #4A90E2; /* 科技蓝点缀色 */
            --text-main: #FFFFFF;
            --text-muted: #8A96A8;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            /* 统一的深色科技蓝渐变背景，右下角带一点点南开紫的暗光 */
            background: linear-gradient(135deg, #0B1021 0%, #162242 55%, #1F1528 100%);
            color: var(--text-main);
            overflow: hidden;
        }

        /* 全屏弹性容器，替代原来的硬分割 */
        .login-container {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 0 8%;
        }

        /* ================= 左侧：文案展示区 (无背景，悬浮在渐变之上) ================= */
        .text-section {
            flex: 1.2;
            padding-right: 50px;
        }

        .text-section i {
            color: var(--tech-blue);
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(74, 144, 226, 0.4); /* 发光特效 */
        }

        .text-section h1 {
            font-weight: 700;
            font-size: 3.2rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .text-section p {
            font-size: 1.2rem;
            color: #A0AABF;
            max-width: 500px;
            line-height: 1.6;
        }


       /* ================= 右侧：毛玻璃表单卡片 ================= */
        .form-section {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .glass-card {
            /* 1. 稍微提亮卡片底色，与极暗的背景彻底拉开色阶 */
            background: rgba(34, 43, 69, 0.7); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            /* 2. 边缘高光处理（核心！顶部和左侧边框调亮，模拟光线照射的玻璃边缘） */
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-left: 1px solid rgba(255, 255, 255, 0.25);
            
            border-radius: 16px;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            
            /* 3. 加深加厚底部阴影，产生强烈的“悬浮”感 */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6); 
        }

        .glass-card h3 {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .glass-card .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .form-label {
            color: #A0AABF;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        /* 优化输入框：加深背景色制造“凹陷”感，与凸起的卡片形成反差 */
        .dark-input {
            background-color: rgba(0, 0, 0, 0.35); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(0, 0, 0, 0.3); /* 顶部暗边，加强凹陷立体感 */
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .dark-input:focus {
            background-color: rgba(0, 0, 0, 0.5);
            border-color: var(--tech-blue);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
            color: white;
            outline: none;
        }

        .dark-input::placeholder {
            color: #5A6A85;
            font-size: 0.95rem;
        }
        /* 渐变色主按钮 */
        .btn-gradient {
            /* 按钮采用科技蓝到南开紫的完美过渡 */
            background: linear-gradient(90deg, #4A90E2 0%, var(--nankai-purple) 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(111, 38, 86, 0.5);
            color: white;
        }

        .toggle-link {
            color: var(--tech-blue);
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }

        .toggle-link:hover {
            text-decoration: underline;
            color: #63a4ff;
        }

        /* 响应式调整：屏幕变小的时候上下排列 */
        @media (max-width: 992px) {
            .login-container { flex-direction: column; text-align: center; padding: 5%; }
            .text-section { padding-right: 0; margin-bottom: 40px; }
            .text-section p { margin: 0 auto; }
            .form-section { justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <!-- 左侧：文案展示区 (融入统一背景中) -->
    <div class="text-section d-none d-lg-block">
        <i class="fa-solid fa-dna fa-4x"></i>
        <h1>单细胞高维向量<br>ANN 检索系统</h1>
        <p>基于先进近似最近邻算法，为您提供百万级单细胞数据的高效聚类、精准比对与动态可视化联合分析服务。</p>
    </div>

    <!-- 右侧：毛玻璃表单卡片区 -->
    <div class="form-section">
        <div class="glass-card">
            
            <div class="text-center">
                <h3 id="form-title">欢迎登录</h3>
                <div class="subtitle" id="form-subtitle">请输入您的账号密码进入系统</div>
            </div>

            <!-- ================= 登录表单 ================= -->
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">系统账号</label>
                    <input type="text" class="form-control dark-input" placeholder="请输入用户名">
                </div>
                <div class="mb-4">
                    <label class="form-label">登录密码</label>
                    <input type="password" class="form-control dark-input" placeholder="请输入密码">
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <!-- 去掉复选框的白底，改暗 -->
                        <input class="form-check-input" type="checkbox" id="rememberMe" style="background-color: rgba(255,255,255,0.2); border: none;">
                        <label class="form-check-label" for="rememberMe" style="color: var(--text-muted); font-size: 0.9rem;">保持登录</label>
                    </div>
                    <a href="#" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">忘记密码?</a>
                </div>

                <!-- 登录按钮，点击后跳转大屏首页 -->
                <button type="button" class="btn btn-gradient w-100" onclick="window.location.href='/'">
                    登录系统
                </button>
                
                <div class="text-center mt-4" style="font-size: 0.95rem;">
                    <span style="color: var(--text-muted);">没有账号？</span> 
                    <span class="toggle-link" onclick="toggleForm('register')">点击申请权限</span>
                </div>
            </form>

            <!-- ================= 注册表单 (默认隐藏) ================= -->
            <form id="register-form" style="display: none;">
                <div class="mb-3">
                    <label class="form-label">设置账号</label>
                    <input type="text" class="form-control dark-input" placeholder="仅限英文字母与数字">
                </div>
                <div class="mb-3">
                    <label class="form-label">真实姓名</label>
                    <input type="text" class="form-control dark-input" placeholder="用于系统实名备案">
                </div>
                <div class="mb-4">
                    <label class="form-label">设置密码</label>
                    <input type="password" class="form-control dark-input" placeholder="至少8位大小写组合">
                </div>
                
                <button type="button" class="btn w-100" style="background-color: #222B45; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px;">
                    提交注册信息
                </button>
                
                <div class="text-center mt-4" style="font-size: 0.95rem;">
                    <span style="color: var(--text-muted);">已有系统权限？</span> 
                    <span class="toggle-link" onclick="toggleForm('login')">返回安全登录</span>
                </div>
            </form>

        </div>
    </div>

</div>

<script>
    // 无刷新切换登录与注册面板
    function toggleForm(target) {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const title = document.getElementById('form-title');
        const subtitle = document.getElementById('form-subtitle');

        if (target === 'register') {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            title.innerText = '注册系统账号';
            subtitle.innerText = '完善下方信息获取可视化大屏权限';
        } else {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            title.innerText = '欢迎登录';
            subtitle.innerText = '请输入您的账号密码进入系统';
        }
    }
</script>

</body>
</html>
