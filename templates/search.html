{% extends "base.html" %}

{% block page_title %}相似检索工作台{% endblock %}

{% block content %}
<div class="row">
    <!-- 左侧 30%：控制面板 -->
    <div class="col-md-4">
        <div class="fluent-card">
            <h5 class="mb-4">查询参数设置</h5>
            <form id="searchForm">
                <div class="mb-3">
                    <label class="form-label text-muted">选择数据集</label>
                    <select class="form-select">
                        <option>Adult_Liver.h5ad</option>
                        <option>Pediatric_Liver.h5ad</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">查询细胞 ID</label>
                    <input type="text" class="form-control" placeholder="输入 Cell ID...">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted">返回数量 (Top-K): <span id="k-value">20</span></label>
                    <input type="range" class="form-range" min="10" max="100" step="10" id="topK">
                </div>
                <!-- 对应PPT加分项的条件检索 -->
                <div class="mb-4">
                    <label class="form-label text-muted">限定细胞类型 (可选)</label>
                    <select class="form-select">
                        <option value="">-- 不限 --</option>
                        <option>T cell</option>
                        <option>hepatocyte</option>
                    </select>
                </div>
                <button type="button" class="btn btn-primary-nankai w-100">
                    <i class="fa-solid fa-magnifying-glass me-2"></i>立刻检索
                </button>
            </form>
        </div>
    </div>

    <!-- 右侧 70%：结果展示 -->
    <div class="col-md-8">
        <div class="fluent-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0">可视化结果</h5>
                <small class="text-muted"><i class="fa-solid fa-circle-check text-success"></i> 耗时 15ms，使用 HNSW 算法为您找到以下细胞</small>
            </div>
            
            <!-- 全黑背景的 UMAP 散点图坑位 -->
            <div id="umap-chart" style="width: 100%; height: 400px; background-color: #111111; border-radius: 6px; margin-bottom: 20px;"></div>
            
            <!-- 数据表格 -->
            <h5 class="mb-3 mt-4">数据详情</h5>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>细胞 ID</th>
                        <th>细胞类型</th>
                        <th>距离分数</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>AAACCTGAG...</td>
                        <td><span class="badge bg-light text-dark border">hepatocyte</span></td>
                        <td>0.012</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>AAACCTGCA...</td>
                        <td><span class="badge bg-light text-dark border">hepatocyte</span></td>
                        <td>0.025</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 监听滑动条，动态改变显示的数字
    document.getElementById('topK').addEventListener('input', function(e) {
        document.getElementById('k-value').innerText = e.target.value;
    });

    // 这里可以初始化 ECharts 画那个全黑背景的 UMAP 图...
</script>
{% endblock %}
