{% extends "base.html" %}

{% block content %}
<style>
    /* ================= 坚如磐石的 Flex 布局 (复用) ================= */
    .search-layout { display: flex; gap: 24px; align-items: flex-start; }
    .search-sidebar { width: 320px; flex-shrink: 0; position: sticky; top: 24px; z-index: 10; }
    .search-main { flex: 1; min-width: 0; }

    /* ================= 表单与组件样式 ================= */
    .form-label { color: #8A96A8; font-size: 0.9rem; margin-bottom: 8px; }
    .dark-control {
        background-color: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 6px;
        padding: 10px 15px;
    }
    .dark-control:focus {
        background-color: rgba(0, 0, 0, 0.4);
        border-color: #4A90E2;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        color: white;
        outline: none;
    }
    .dark-control option { background-color: #141A30; color: white; }
    .form-range::-webkit-slider-thumb { background: #923a73; }
    
    .btn-glow-purple {
        background-color: #923a73;
        border: none;
        color: white;
        font-weight: 600;
        padding: 12px;
        border-radius: 6px;
        transition: all 0.3s;
    }
    .btn-glow-purple:hover {
        background-color: #a84685;
        box-shadow: 0 0 15px rgba(168, 70, 133, 0.5);
        color: white;
    }

    /* 图表容器 */
    .chart-box {
        background-color: #050814; 
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.05);
        padding: 15px;
    }
    
    /* 顶部小数据卡片 */
    .stat-badge {
        background-color: rgba(74, 144, 226, 0.1);
        border: 1px solid rgba(74, 144, 226, 0.3);
        color: #4A90E2;
        padding: 8px 15px;
        border-radius: 6px;
        font-weight: 600;
        font-family: monospace;
        font-size: 1.1rem;
    }
</style>

<div class="search-layout">
    
    <!-- ================= 左侧：参数控制台 ================= -->
    <div class="search-sidebar">
        <div class="dark-card m-0">
            <h5 class="fw-bold mb-4" style="letter-spacing: 1px;">
                <i class="fa-solid fa-stopwatch me-2" style="color: #4A90E2;"></i>跑分实验设置
            </h5>
            
            <form id="benchmarkForm">
                <div class="mb-4">
                    <label class="form-label">评测数据集</label>
                    <select class="form-select dark-control" id="benchmarkDatasetSelect">
                        <option value="" disabled selected>正在加载数据集...</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">算法比对组</label>
                    <div class="p-3" style="background: rgba(0,0,0,0.2); border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" checked disabled>
                            <label class="form-check-label text-white">精确检索 (暴力计算 KNN)</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" checked disabled>
                            <label class="form-check-label text-white">近似检索 (FAISS-HNSW)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" checked disabled>
                            <label class="form-check-label text-white">近似检索 (FAISS-IVF)</label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">随机抽样查询次数</label>
                    <input type="number" class="form-control dark-control" id="queryCount" value="500" min="10" max="5000">
                    <small class="text-muted mt-1 d-block">系统将随机抽取这些数量的细胞进行并发查询跑分。</small>
                </div>

                <div class="mb-5">
                    <label class="form-label d-flex justify-content-between">
                        <span>Top-K 召回数量</span>
                        <strong id="k-value" style="color: #4A90E2;">20</strong>
                    </label>
                    <input type="range" class="form-range" min="10" max="100" step="10" value="20" id="topKSlider">
                </div>

                <button type="button" class="btn btn-glow-purple w-100" id="startBenchmarkBtn">
                    <i class="fa-solid fa-rocket me-2"></i>开始性能跑分
                </button>

                <div class="mt-4">
                    <label class="form-label">历史记录</label>
                    <div class="p-3" style="background: rgba(0,0,0,0.2); border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);">
                        <div id="benchmarkHistory" style="color: #8A96A8; font-size: 0.85rem;">暂无记录</div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- ================= 右侧：评测报告面板 ================= -->
    <div class="search-main">
        
        <!-- 头部跑分摘要 -->
        <div class="dark-card mb-4 d-flex justify-content-between align-items-center" style="padding: 15px 25px;">
            <div class="fw-bold fs-5 text-white">
                <i class="fa-solid fa-chart-line me-2" style="color: #4A90E2;"></i>实验结果评估报告
            </div>
            <div class="d-flex gap-3">
                <div class="stat-badge" id="stat-time">Avg Time: -- ms</div>
                <div class="stat-badge" id="stat-recall" style="color: #2ecc71; border-color: rgba(46,204,113,0.3); background-color: rgba(46,204,113,0.1);">Recall: -- %</div>
            </div>
        </div>

        <div id="benchmarkWarning" class="mb-3" style="color: #F5A623; font-size: 0.85rem; display: none;"></div>

        <!-- 1. 速度对比柱状图 -->
        <div class="dark-card mb-4" style="padding: 20px;">
            <h6 class="text-white mb-3 fw-bold">查询响应时间对比 (Latency)</h6>
            <div id="timeChart" class="chart-box" style="width: 100%; height: 300px;"></div>
        </div>

        <!-- 2. 精度对比折线图 -->
        <div class="dark-card" style="padding: 20px; margin-bottom: 0;">
            <h6 class="text-white mb-3 fw-bold">算法召回率/准确率曲线 (Recall @ K)</h6>
            <div id="recallChart" class="chart-box" style="width: 100%; height: 300px;"></div>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 滑动条联动
    const slider = document.getElementById('topKSlider');
    const kValue = document.getElementById('k-value');
    const datasetSelect = document.getElementById('benchmarkDatasetSelect');
    const queryCountInput = document.getElementById('queryCount');
    const historyContainer = document.getElementById('benchmarkHistory');
    slider.addEventListener('input', (e) => { kValue.innerText = e.target.value; });

    // ================= 初始化 ECharts 实例 =================
    const timeChart = echarts.init(document.getElementById('timeChart'));
    const recallChart = echarts.init(document.getElementById('recallChart'));

    // 公共暗黑风格配置
    const commonTheme = {
        backgroundColor: 'transparent',
        tooltip: { backgroundColor: 'rgba(20, 26, 48, 0.9)', borderColor: '#4A90E2', textStyle: { color: '#fff' } },
        xAxis: { axisLine: { lineStyle: { color: '#8A96A8' } }, axisLabel: { color: '#8A96A8' } },
        yAxis: { splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }, axisLabel: { color: '#8A96A8' } },
        legend: { textStyle: { color: '#fff' } }
    };

    // 1. 初始化空的速度对比图
    const timeOption = {
        ...commonTheme,
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '15%', containLabel: true },
        xAxis: { type: 'category', data: ['精确搜索 (Exact KNN)', '近似搜索 (FAISS-HNSW)', '近似搜索 (FAISS-IVF)'], ...commonTheme.xAxis },
        yAxis: { type: 'value', name: '平均耗时 (ms)', nameTextStyle: { color: '#8A96A8' }, ...commonTheme.yAxis },
        series: [{
            type: 'bar',
            barWidth: '40%',
            itemStyle: { borderRadius: [4, 4, 0, 0] },
            data: [0, 0, 0] // 初始数据为0
        }]
    };
    timeChart.setOption(timeOption);

    // 2. 初始化空的精度曲线图
    const recallOption = {
        ...commonTheme,
        tooltip: { trigger: 'axis' },
        legend: { data: ['精确搜索', 'FAISS-HNSW', 'FAISS-IVF'], ...commonTheme.legend },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '20%', containLabel: true },
        xAxis: { type: 'category', data: ['Top-10', 'Top-20', 'Top-50', 'Top-100'], name: 'K值', ...commonTheme.xAxis },
        yAxis: { type: 'value', name: '召回率 (%)', min: 80, max: 100, ...commonTheme.yAxis },
        series: [
            { name: '精确搜索', type: 'line', data: [100, 100, 100, 100], lineStyle: { type: 'dashed', color: '#8A96A8' }, itemStyle: { color: '#8A96A8' } },
            { name: 'FAISS-HNSW', type: 'line', data: [null, null, null, null], itemStyle: { color: '#4A90E2' }, smooth: true },
            { name: 'FAISS-IVF', type: 'line', data: [null, null, null, null], itemStyle: { color: '#E83E8C' }, smooth: true }
        ]
    };
    recallChart.setOption(recallOption);

    const algoColors = {
        brute: '#ff4757',
        faiss_hnsw: '#4A90E2',
        hnswlib: '#1ABC9C',
        faiss_ivf: '#E83E8C'
    };

    function buildRecallSeries(algorithms, kLabels) {
        return algorithms.map(algo => {
            const color = algoColors[algo.id] || '#8A96A8';
            const isExact = algo.id === 'brute';
            return {
                name: algo.label,
                type: 'line',
                data: algo.recall_curve || kLabels.map(() => null),
                lineStyle: { type: isExact ? 'dashed' : 'solid', color },
                itemStyle: { color },
                smooth: !isExact
            };
        });
    }

    function updateStats(algorithms) {
        const approx = algorithms.filter(item => item.available && item.id !== 'brute');
        const statTime = document.getElementById('stat-time');
        const statRecall = document.getElementById('stat-recall');

        if (approx.length === 0) {
            statTime.innerText = 'Avg Time: -- ms';
            statRecall.innerText = 'Recall: -- %';
            return;
        }

        const fastest = approx.reduce((best, item) => {
            if (best === null) return item;
            if (item.avg_ms === null || item.avg_ms === undefined) return best;
            return item.avg_ms < best.avg_ms ? item : best;
        }, null);

        const bestRecall = approx.reduce((best, item) => {
            const recalls = (item.recall_curve || []).filter(val => val !== null && val !== undefined);
            const last = recalls.length ? recalls[recalls.length - 1] : null;
            if (last === null) return best;
            if (best === null || last > best.value) {
                return { label: item.label, value: last };
            }
            return best;
        }, null);

        if (fastest) {
            statTime.innerText = `${fastest.label}: ${fastest.avg_ms.toFixed(2)} ms`;
        } else {
            statTime.innerText = 'Avg Time: -- ms';
        }

        if (bestRecall) {
            statRecall.innerText = `${bestRecall.label} Recall: ${bestRecall.value.toFixed(2)} %`;
        } else {
            statRecall.innerText = 'Recall: -- %';
        }
    }

    function renderBenchmarkResult(data) {
        const algorithms = data.algorithms || [];
        const kValues = data.k_values || [10, 20, 50, 100];
        const kLabels = kValues.map(k => `Top-${k}`);
        const warningBox = document.getElementById('benchmarkWarning');

        const unavailable = algorithms.filter(item => !item.available);
        if (unavailable.length > 0) {
            const labels = unavailable.map(item => item.label).join('、');
            warningBox.innerText = `以下算法不可用（缺少依赖或配置不支持）：${labels}`;
            warningBox.style.display = 'block';
        } else {
            warningBox.style.display = 'none';
        }

        const categories = algorithms.map(item => item.label);
        const barData = algorithms.map(item => {
            if (!item.available || item.avg_ms === null || item.avg_ms === undefined) {
                return { value: null, itemStyle: { color: '#3A435E' } };
            }
            return { value: item.avg_ms, itemStyle: { color: algoColors[item.id] || '#4A90E2' } };
        });

        timeChart.setOption({
            xAxis: { type: 'category', data: categories, ...commonTheme.xAxis },
            series: [{ data: barData }]
        });

        recallChart.setOption({
            legend: { data: algorithms.map(item => item.label), ...commonTheme.legend },
            xAxis: { type: 'category', data: kLabels, name: 'K值', ...commonTheme.xAxis },
            series: buildRecallSeries(algorithms, kLabels)
        });

        updateStats(algorithms);
    }

    async function loadDatasets() {
        try {
            const res = await fetch('/api/datasets');
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '数据集加载失败');
            if (!data.datasets || data.datasets.length === 0) {
                datasetSelect.innerHTML = '<option value="" disabled selected>暂无数据集</option>';
                datasetSelect.disabled = true;
                return;
            }
            datasetSelect.innerHTML = data.datasets
                .map(ds => `<option value="${ds.id}">${ds.filename}</option>`)
                .join('');
        } catch (err) {
            datasetSelect.innerHTML = '<option value="" disabled selected>加载失败</option>';
            datasetSelect.disabled = true;
        }
    }

    async function loadBenchmarkHistory() {
        try {
            const res = await fetch('/api/benchmark/history?limit=5');
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '历史记录加载失败');
            const history = data.history || [];
            if (history.length === 0) {
                historyContainer.innerText = '暂无记录';
                return;
            }
            historyContainer.innerHTML = history
                .slice(-5)
                .reverse()
                .map(item => {
                    return `
                        <div class="d-flex justify-content-between" style="font-size: 0.82rem;">
                            <span>${item.created_at}</span>
                            <span>Q:${item.query_count} | K:${item.k}</span>
                        </div>
                    `;
                })
                .join('');
        } catch (err) {
            historyContainer.innerText = '历史记录加载失败';
        }
    }

    // ================= 点击【开始跑分】的交互逻辑 =================
    document.getElementById('startBenchmarkBtn').addEventListener('click', async function() {
        const btn = this;
        const datasetId = datasetSelect.value;
        const queryCount = parseInt(queryCountInput.value, 10);
        const topK = parseInt(slider.value, 10);

        if (!datasetId) {
            alert('请先选择数据集');
            return;
        }

        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>正在压测计算...';
        btn.disabled = true;

        timeChart.showLoading({ text: '引擎运算中...', color: '#4A90E2', textColor: '#fff', maskColor: 'rgba(5, 8, 20, 0.8)' });
        recallChart.showLoading({ text: '召回率评估中...', color: '#E83E8C', textColor: '#fff', maskColor: 'rgba(5, 8, 20, 0.8)' });

        try {
            const res = await fetch('/api/benchmark', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dataset_id: datasetId,
                    query_count: queryCount,
                    k: topK
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '跑分失败');

            renderBenchmarkResult(data);
            await loadBenchmarkHistory();

            btn.innerHTML = '<i class="fa-solid fa-rocket me-2"></i>重新开始跑分';
            btn.disabled = false;
        } catch (err) {
            btn.innerHTML = '<i class="fa-solid fa-rocket me-2"></i>开始性能跑分';
            btn.disabled = false;
            alert(err.message || '跑分失败，请检查后端日志');
        } finally {
            timeChart.hideLoading();
            recallChart.hideLoading();
        }
    });

    loadDatasets();
    loadBenchmarkHistory();

    // 窗口调整适配
    window.addEventListener('resize', () => {
        timeChart.resize();
        recallChart.resize();
    });
</script>
{% endblock %}
